<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifre Sıfırlama</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg border border-gray-200 p-8">
    <h1 class="text-xl font-bold text-gray-800 mb-2">Yeni Şifre Belirle</h1>
    <p class="text-gray-600 text-sm mb-4">En az 8 karakter, 1 büyük harf, 1 küçük harf, 1 rakam ve 1 özel karakter (!@#$%^&* vb.) kullanın.</p>
    <form id="reset-form" class="space-y-4">
      <input type="hidden" id="token" name="token" />
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Yeni şifre</label>
        <input type="password" id="newPassword" required autocomplete="new-password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="••••••••" />
        <p id="policy-error" class="text-red-600 text-sm mt-1 hidden"></p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Şifre tekrar</label>
        <input type="password" id="newPassword2" required autocomplete="new-password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="••••••••" />
        <p id="match-error" class="text-red-600 text-sm mt-1 hidden"></p>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg">Şifreyi Güncelle</button>
      <p id="form-error" class="text-red-600 text-sm hidden" role="alert"></p>
      <p id="form-success" class="text-green-600 text-sm hidden" role="alert"></p>
    </form>
    <p class="mt-4 text-center"><a href="/admin" class="text-blue-600 hover:underline">Giriş sayfasına dön</a></p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token') || '';
      document.getElementById('token').value = token;
      if (!token) {
        document.getElementById('reset-form').querySelector('button[type="submit"]').disabled = true;
        document.getElementById('form-error').textContent = 'Geçersiz bağlantı. Şifre sıfırlama için e-postanızdaki bağlantıyı kullanın.';
        document.getElementById('form-error').classList.remove('hidden');
      }
      document.getElementById('reset-form').addEventListener('submit', function (e) {
        e.preventDefault();
        document.getElementById('policy-error').classList.add('hidden');
        document.getElementById('match-error').classList.add('hidden');
        document.getElementById('form-error').classList.add('hidden');
        var pw = document.getElementById('newPassword').value;
        var pw2 = document.getElementById('newPassword2').value;
        if (pw !== pw2) {
          document.getElementById('match-error').textContent = 'Şifreler aynı olmalıdır.';
          document.getElementById('match-error').classList.remove('hidden');
          return;
        }
        fetch('/api/admin/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, newPassword: pw }),
        }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); }).then(function (result) {
          if (result.ok) {
            document.getElementById('form-success').textContent = result.data.message || 'Şifre güncellendi.';
            document.getElementById('form-success').classList.remove('hidden');
            document.getElementById('reset-form').reset();
            document.getElementById('token').value = token;
            setTimeout(function () { window.location.href = '/admin'; }, 2000);
          } else {
            document.getElementById('form-error').textContent = result.data.error || 'İşlem başarısız.';
            document.getElementById('form-error').classList.remove('hidden');
          }
        }).catch(function () {
          document.getElementById('form-error').textContent = 'Bağlantı hatası.';
          document.getElementById('form-error').classList.remove('hidden');
        });
      });
    })();
  </script>
</body>
</html>
