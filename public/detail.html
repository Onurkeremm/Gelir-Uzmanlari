<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haber Detayı - Gelir Uzmanları</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], heading: ['Poppins', 'Inter', 'sans-serif'] },
          colors: { primary: '#0A1929', 'primary-light': '#1A2B4C', accent: '#0066CC' },
        },
      },
    };
  </script>
  <style>
    :root {
      --color-primary: #0A1929;
      --color-accent: #0066CC;
      --color-heading: #1E293B;
      --color-text: #475569;
      --color-bg: #f8faff;
      --radius: 10px;
    }
    body { font-family: 'Inter', system-ui, sans-serif; line-height: 1.6; color: var(--color-text); }
    .font-heading { font-family: 'Poppins', 'Inter', sans-serif; }
    .prose p { margin-bottom: 1rem; }
  </style>
</head>
<body class="bg-[#f8faff] min-h-screen antialiased">
  <header class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <a href="/" class="font-heading font-bold text-xl text-[var(--color-primary)]">Gelir Uzmanları</a>
      <a href="/" class="text-sm font-medium text-[var(--color-accent)] hover:underline">← Ana Sayfaya Dön</a>
    </div>
  </header>

  <main id="detail-main" class="max-w-4xl mx-auto px-4 sm:px-6 py-10">
    <div id="loading" class="flex justify-center py-20">
      <div class="animate-pulse flex flex-col items-center gap-3">
        <div class="w-10 h-10 border-2 border-gray-300 border-t-[var(--color-accent)] rounded-full animate-spin"></div>
        <span class="text-sm text-[var(--color-text)]">Yükleniyor...</span>
      </div>
    </div>
    <article id="article" class="hidden bg-white rounded-[var(--radius)] shadow-sm border border-gray-100 overflow-hidden">
      <div class="aspect-video w-full bg-gray-100 overflow-hidden">
        <img id="article-image" src="" alt="" class="w-full h-full object-cover" />
      </div>
      <div class="p-6 sm:p-8">
        <span id="article-category" class="inline-block text-xs font-medium px-2.5 py-1 rounded-md bg-[#f8faff] text-[var(--color-accent)] mb-3"></span>
        <h1 id="article-title" class="font-heading font-bold text-2xl sm:text-3xl text-[var(--color-heading)] leading-tight mb-4"></h1>
        <div class="flex items-center gap-4 text-sm text-[var(--color-text)] mb-6">
          <span id="article-views" class="flex items-center gap-1">👁️ —</span>
          <time id="article-date" datetime="">—</time>
        </div>
        <div id="article-content" class="prose prose-slate max-w-none text-[var(--color-text)]" style="line-height: 1.7;"></div>
      </div>
    </article>
    <div id="error" class="hidden text-center py-16">
      <p class="text-red-600 font-medium">Haber yüklenemedi.</p>
      <a href="/" class="inline-block mt-4 text-[var(--color-accent)] hover:underline">Ana Sayfaya Dön</a>
    </div>
  </main>

  <footer class="mt-12 py-6 border-t border-gray-200 bg-white">
    <div class="max-w-4xl mx-auto px-4 text-center text-sm text-[var(--color-text)]">
      © 2026 Gelir Uzmanları
    </div>
  </footer>

  <script src="/detail.js"></script>
</body>
</html>
