<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haberler - Gelir Uzmanları</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], heading: ['Poppins', 'Inter', 'sans-serif'] },
          colors: { primary: '#0A1929', 'primary-light': '#1A2B4C', accent: '#0066CC' },
        },
      },
    };
  </script>
  <style>
    :root {
      --color-primary: #0A1929;
      --color-accent: #0066CC;
      --color-heading: #1E293B;
      --color-text: #475569;
      --color-bg: #f8faff;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(10, 25, 41, 0.06);
      --shadow-hover: 0 4px 12px rgba(10, 25, 41, 0.08);
    }
    body { font-family: 'Inter', system-ui, sans-serif; line-height: 1.6; color: var(--color-text); }
    .font-heading { font-family: 'Poppins', 'Inter', sans-serif; }
    .album-card { height: 380px; display: flex; flex-direction: column; border-radius: var(--radius); border: 1px solid rgba(10, 25, 41, 0.06); }
    .album-card .card-image-wrap { flex: 0 0 60%; min-height: 0; }
    .album-card .card-body-wrap { flex: 0 0 40%; min-height: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 1.25rem; }
    .album-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    .header-scrolled { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .nav-link.active { color: var(--color-accent); border-bottom: 2px solid var(--color-accent); }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: #1A2B4C; }
  </style>
</head>
<body class="bg-[#f8faff] min-h-screen antialiased">
  <header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 py-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
      <a href="/" class="font-heading font-bold text-xl text-[var(--color-primary)]">Gelir Uzmanları</a>
      <nav class="hidden md:flex items-center gap-8">
        <a href="/" class="nav-link text-sm font-medium text-[var(--color-text)] hover:text-[var(--color-accent)] transition-colors pb-1 border-b-2 border-transparent">Ana Sayfa</a>
        <a href="/haberler" class="nav-link active text-sm font-medium text-[var(--color-accent)] hover:text-[var(--color-accent)] transition-colors pb-1 border-b-2 border-[var(--color-accent)]">Haberler</a>
        <a href="/hizmetler" class="nav-link text-sm font-medium text-[var(--color-text)] hover:text-[var(--color-accent)] transition-colors pb-1 border-b-2 border-transparent">Hizmetler</a>
        <a href="/cok-okunanlar" class="nav-link text-sm font-medium text-[var(--color-text)] hover:text-[var(--color-accent)] transition-colors pb-1 border-b-2 border-transparent">Çok Okunanlar</a>
      </nav>
      <a href="/iletisim" class="hidden md:inline-flex items-center px-4 py-2 rounded-lg btn-primary text-sm font-medium transition-colors">İletişim</a>
      <button id="menu-toggle" type="button" class="md:hidden p-2 rounded-lg text-[var(--color-primary)]" aria-label="Menü">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white/95 backdrop-blur mt-2 py-3 px-4 rounded-b-xl shadow-lg">
      <a href="/" class="block py-2 text-[var(--color-text)] font-medium">Ana Sayfa</a>
      <a href="/haberler" class="block py-2 text-[var(--color-accent)] font-medium">Haberler</a>
      <a href="/hizmetler" class="block py-2 text-[var(--color-text)] font-medium">Hizmetler</a>
      <a href="/cok-okunanlar" class="block py-2 text-[var(--color-text)] font-medium">Çok Okunanlar</a>
      <a href="/iletisim" class="block py-2 text-[var(--color-text)] font-medium">İletişim</a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-32 pb-12">
    <h1 class="font-heading font-bold text-3xl text-[var(--color-heading)] mb-8">Haberler</h1>
    <div id="albums-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div id="loading-cards" class="col-span-full flex justify-center py-16">
        <div class="animate-pulse flex flex-col items-center gap-3">
          <div class="w-10 h-10 border-2 border-gray-300 border-t-[var(--color-accent)] rounded-full animate-spin"></div>
          <span class="text-sm text-[var(--color-text)]">Yükleniyor...</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="mt-16 bg-[var(--color-primary)] text-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col sm:flex-row justify-between items-center gap-4 text-sm opacity-90">
        <span>© 2026 Gelir Uzmanları</span>
        <div class="flex gap-6">
          <a href="/" class="hover:underline">Ana Sayfa</a>
          <a href="/haberler" class="hover:underline">Haberler</a>
          <a href="/hizmetler" class="hover:underline">Hizmetler</a>
          <a href="/cok-okunanlar" class="hover:underline">Çok Okunanlar</a>
          <a href="/iletisim" class="hover:underline">İletişim</a>
          <a href="/admin" class="hover:underline">Yönetim Paneli</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/haberler.js"></script>
  <script>
    (function () {
      var header = document.getElementById('header');
      var menuToggle = document.getElementById('menu-toggle');
      var mobileMenu = document.getElementById('mobile-menu');
      if (window.scrollY > 20) header.classList.add('header-scrolled', 'shadow-sm');
      window.addEventListener('scroll', function () {
        if (window.scrollY > 20) header.classList.add('header-scrolled', 'shadow-sm');
        else header.classList.remove('header-scrolled', 'shadow-sm');
      });
      if (menuToggle && mobileMenu) {
        menuToggle.addEventListener('click', function () { mobileMenu.classList.toggle('hidden'); });
      }
    })();
  </script>
</body>
</html>
